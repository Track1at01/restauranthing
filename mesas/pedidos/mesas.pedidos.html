<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mesas</title>
  <link rel="stylesheet" href="./mesas.pedidos.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap">
</head>
<body>
    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="user">
            <div class="avatar"></div>
            <span>Mesero</span>
            </div>

            <nav>
            <button class="active">Mesas</button>
            <button class="inactive">Rápido</button>
            <button class="inactive">Domicilios</button>
            <button class="inactive">Caja</button>
            <button class="inactive">Inventario</button>
            <button class="inactive">Historial</button>
            </nav>
        </aside>

    <!-- Contenido -->
        <main class="content">
            <div class="content-header">
                <h1>Mesas</h1>
                <div class="table-actions">
                    <button id="add-table" class="action-btn">Añadir mesa</button>
                    <button id="remove-table" class="action-btn secondary">Eliminar mesa</button>
                </div>
            </div>

            <div class="tables-grid">

            <div class="table active" data-table-number="1">
                <div class="icon">🍽️</div>
                <p>Mesa 1</p>
            </div>

            <div class="table inactive" data-table-number="2">
                <div class="icon">🍽️</div>
                <p>Mesa 2</p>
            </div>

            <div class="table active" data-table-number="3">
                <div class="icon">🍽️</div>
                <p>Mesa 3</p>
            </div>

            <div class="table active" data-table-number="4">
                <div class="icon">🍽️</div>
                <p>Mesa 4</p>
            </div>

            <div class="table inactive" data-table-number="5">
                <div class="icon">🍽️</div>
                <p>Mesa 5</p>
            </div>

            <div class="table active" data-table-number="6">
                <div class="icon">🍽️</div>
                <p>Mesa 6</p>
            </div>

            </div>

            <div class="table-modal-overlay hidden" id="table-modal-overlay">
                <div class="table-modal" role="dialog" aria-modal="true" aria-labelledby="table-modal-title">
                    <div class="table-modal-header">
                        <div>
                            <h2 id="table-modal-title">Mesa 1</h2>
                            <p class="modal-state" id="table-modal-state">Estado: Activa</p>
                        </div>
                        <button class="modal-close" id="close-modal" aria-label="Cerrar menú">×</button>
                    </div>

                    <div class="table-modal-actions">
                        <button class="modal-action-btn" id="toggle-table-state">Activar / Desactivar</button>
                        <button class="modal-action-btn secondary" id="view-bill">Ver cuenta</button>
                    </div>

                    <div class="bill-panel hidden" id="bill-section">
                        <div class="bill-header">
                            <h3>Cuenta de la mesa</h3>
                        </div>
                        <div class="bill-list" id="bill-body"></div>
                        <div class="bill-summary">
                            <span>Total</span>
                            <strong id="bill-total">$0.00</strong>
                        </div>
                        <div class="split-row">
                            <label for="split-count">Dividir entre</label>
                            <input id="split-count" type="number" min="1" value="1">
                        </div>
                        <div class="split-result">
                            <span>Por persona</span>
                            <strong id="split-amount">$0.00</strong>
                        </div>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <script src="./mesas.js"></script>

</body>
</html>
